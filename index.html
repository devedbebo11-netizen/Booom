<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.screen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.title{
    font-size:55px;
    letter-spacing:5px;
    animation:flicker 1.5s infinite;
}

.sub{
    margin-top:15px;
    opacity:.7;
    letter-spacing:2px;
}

button{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    background:white;
    color:black;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

button:hover{
    transform:scale(1.07);
}

#final{
    display:none;
    background:black;
}

.big{
    font-size:70px;
    animation:pop .5s ease;
}

.small{
    margin-top:20px;
    font-size:22px;
    opacity:.7;
}

@keyframes pop{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:.4;}
}

</style>
</head>

<body>

<div class="screen" id="start">

    <div class="title">
        ARCHIVE_17
    </div>

    <div class="sub">
        OPEN THE HIDDEN FILE
    </div>

    <button onclick="openFile()">
        OPEN FILE
    </button>

</div>

<div class="screen" id="final">

    <div class="big">
        😂 اتخضيت صح؟
    </div>

    <div class="small">
        متقلقش يا عم ده مقلب
    </div>

</div>

<script>

function openFile(){

    document.querySelector(".sub").innerHTML =
    "SCANNING...";

    setTimeout(() => {

        document.querySelector(".sub").innerHTML =
        "MATCH FOUND";

    },1200);

    setTimeout(() => {

        document.getElementById("start").style.display = "none";

        document.getElementById("final").style.display = "flex";

    },2500);

}

</script>

</body>
</html>
